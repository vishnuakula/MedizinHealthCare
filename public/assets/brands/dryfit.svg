<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="white"/>
  <!-- Rx symbol -->
  <text x="40" y="55" font-family="serif" font-size="18" fill="#dc2626" font-style="italic">Rx</text>
  <!-- Blue arcs above DRYFIT -->
  <path d="M100,70 Q200,30 330,80" fill="none" stroke="#1e40af" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M120,80 Q220,45 330,90" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M140,88 Q230,58 330,98" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
  <!-- DRYFIT text -->
  <text x="200" y="170" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="url(#redGrad)">DRYFIT</text>
  <!-- DUSTING POWDER text -->
  <line x1="80" y1="195" x2="140" y2="195" stroke="#1e3a5f" stroke-width="2.5"/>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="4" fill="#1e3a5f">DUSTING POWDER</text>
  <line x1="265" y1="195" x2="325" y2="195" stroke="#1e3a5f" stroke-width="2.5"/>
</svg>
