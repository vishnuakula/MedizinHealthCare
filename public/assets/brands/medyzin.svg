<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="mgrd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="white"/>
  <!-- Medical cross -->
  <rect x="165" y="55" width="24" height="60" rx="4" fill="#2563eb"/>
  <rect x="147" y="73" width="60" height="24" rx="4" fill="#2563eb"/>
  <!-- Medyzin text -->
  <text x="200" y="160" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="url(#mgrd)">MEDYZIN</text>
  <!-- Healthcare text -->
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle" letter-spacing="3" fill="#64748b">HEALTHCARE</text>
  <!-- Subtle underline -->
  <line x1="120" y1="210" x2="280" y2="210" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
</svg>
