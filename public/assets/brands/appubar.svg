<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="white"/>
  <!-- Rx symbol -->
  <text x="40" y="60" font-family="serif" font-size="18" fill="#dc2626" font-style="italic">Rx</text>
  <!-- Bubbles -->
  <circle cx="220" cy="55" r="6" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="235" cy="42" r="5" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="250" cy="50" r="4" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="245" cy="35" r="3" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="260" cy="42" r="3.5" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <!-- Baby splash arc -->
  <path d="M100,90 Q200,60 300,90" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- APPUBAR text -->
  <text x="200" y="160" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#d946a8">APPUBAR</text>
  <!-- Baby Soap text -->
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#2563eb">Baby Soap</text>
  <!-- Blue wave -->
  <path d="M30,235 Q120,215 200,235 Q280,255 370,230" fill="none" stroke="url(#wave)" stroke-width="3" stroke-linecap="round"/>
</svg>
