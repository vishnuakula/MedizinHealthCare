<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <rect width="100%" height="100%" rx="16" fill="white"/>
  <!-- Rx symbol -->
  <text x="40" y="60" font-family="serif" font-size="18" fill="#dc2626" font-style="italic">Rx</text>
  <!-- Green arc -->
  <path d="M60,120 Q200,50 350,110" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  <!-- APPUMOL text -->
  <text x="175" y="160" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#16a34a">APPUMOL</text>
  <!-- 250 in blue -->
  <text x="340" y="145" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#1e40af">250</text>
  <!-- Suspension text -->
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e3a5f">Suspension</text>
  <!-- Green underline -->
  <line x1="80" y1="218" x2="320" y2="218" stroke="#16a34a" stroke-width="3"/>
  <!-- Blue underline -->
  <line x1="80" y1="225" x2="320" y2="225" stroke="#1e40af" stroke-width="2"/>
</svg>
