<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <rect width="100%" height="100%" rx="16" fill="white"/>
  <!-- Rx symbol -->
  <text x="40" y="60" font-family="serif" font-size="18" fill="#dc2626" font-style="italic">Rx</text>
  <!-- Nullworm-Plus text -->
  <text x="200" y="145" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="#ea580c">Nullworm-Plus</text>
  <!-- Registered symbol -->
  <text x="365" y="120" font-family="Arial" font-size="14" fill="#ea580c">®</text>
  <!-- Orange underline -->
  <line x1="60" y1="165" x2="340" y2="165" stroke="#ea580c" stroke-width="2.5"/>
  <!-- Suspension text -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#ea580c">Suspension</text>
  <!-- Bottom orange line -->
  <line x1="100" y1="215" x2="300" y2="215" stroke="#ea580c" stroke-width="2"/>
</svg>
